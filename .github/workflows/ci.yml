name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  RUST_BACKTRACE: 1

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable @ 2026-05-13
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      # Invoke cargo via its absolute path rather than relying on PATH lookup.
      # macOS runner images currently ship a broken Homebrew `cargo` wrapper
      # that dispatches to `rustup-init` and fails with "unexpected argument
      # 'build'". Using $HOME/.cargo/bin/cargo (where dtolnay installs the
      # rustup-managed proxies) sidesteps the broken stub entirely. The same
      # path works on Ubuntu, so we use it uniformly. Refs:
      # actions/runner-images#13985, Homebrew/homebrew-core#178311.
      - name: cargo build
        run: $HOME/.cargo/bin/cargo build --workspace --all-targets --locked
      - name: cargo test
        run: $HOME/.cargo/bin/cargo test --workspace --all-targets --locked

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable @ 2026-05-13
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: cargo fmt
        run: $HOME/.cargo/bin/cargo fmt --all -- --check
      - name: cargo clippy
        run: $HOME/.cargo/bin/cargo clippy --workspace --all-targets --locked -- -D warnings
