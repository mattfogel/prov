name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  RUST_BACKTRACE: 1

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo build
        run: cargo build --workspace --all-targets --locked
      - name: cargo test
        run: cargo test --workspace --all-targets --locked

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  action:
    name: action (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: action
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: action/package-lock.json
      - run: npm ci
      - name: tsc --noEmit
        run: npm run lint
      - name: jest
        run: npm test
      - name: ncc build
        run: npm run build
      - name: dist/ is up to date
        run: |
          if ! git diff --quiet -- dist/; then
            echo "::error::Committed dist/ is stale. Run 'npm run build' inside action/ and commit the result."
            git --no-pager diff dist/ | head -200
            exit 1
          fi
