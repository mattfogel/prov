name: 'Prov PR Intent Timeline'
description: 'Posts a per-session "PR intent timeline" comment summarizing the Claude Code prompts that produced this PR.'
author: 'Matt Fogel'
branding:
  icon: 'git-pull-request'
  color: 'purple'

inputs:
  github-token:
    description: |
      Token used to read PRs and post the comment. Needs `pull-requests: write` and
      `contents: read`. The default `${{ secrets.GITHUB_TOKEN }}` is fine for most
      repos as long as the workflow grants those permissions.
    required: true
  prov-version:
    description: |
      Prov release tag to download (e.g. `v0.1.1`). Defaults to the latest
      published GitHub Release. Pin this in production so a release-asset
      compromise cannot silently change the binary the runner executes.
    required: false
    default: ''
  base-ref:
    description: |
      Override the diff base. Defaults to the PR target branch
      (`github.event.pull_request.base.ref`). Set this when you need to compute
      the timeline against a different base than GitHub's default.
    required: false
    default: ''
  head-ref:
    description: |
      Override the diff head. Defaults to `HEAD` of the checked-out tree.
    required: false
    default: ''
  skip-verification:
    description: |
      Skip Sigstore cosign verification of the downloaded binary. Off by default;
      a missing cosign bundle should fail the run rather than silently degrade.
      Setting this to `true` exposes you to release-asset replacement attacks.
    required: false
    default: 'false'

outputs:
  comment-id:
    description: |
      GitHub numeric ID of the upserted PR comment as a string, or the empty
      string when no comment was posted (non-pull_request event, or the
      timeline renderer produced no body). The output is always set, never
      absent — downstream steps can rely on `outputs.comment-id == ''` to
      detect the no-post case.

runs:
  using: 'node20'
  main: 'dist/index.js'
